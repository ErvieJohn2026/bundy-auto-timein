name: Test PHT Time Window

on:
  schedule:
    # Every minute from 7:30–7:45 AM PHT
    # (23:30–23:45 UTC of the previous day)
    - cron: "21-25 8 * * 0,1,3,4"

  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify PHT Window
        shell: bash
        run: |
          PHT=$(TZ=Asia/Manila date +%H:%M)

          echo "Current PHT: $PHT"

          if [[ "$PHT" < "17:21" || "$PHT" > "17:25" ]]; then
            echo "Outside allowed window."
            exit 0
          fi

          echo "Inside allowed window."

      - name: Run test.py
        run: |
          python test.py
