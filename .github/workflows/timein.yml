name: Bundy Time In

on:
  schedule:
    # 7:30-7:45 AM PHT = 11:30-11:45 PM UTC (previous day)
    - cron: "30-45 23 * * 0,1,3,4"

  workflow_dispatch:

jobs:
  timein:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Random minute
        shell: bash
        run: |
          MINUTE=$(date -u +%-M)

          TARGET=$((30 + RANDOM % 16))

          echo "Current: $MINUTE"
          echo "Target : $TARGET"

          [ "$MINUTE" = "$TARGET" ]

      - name: Time In
        run: |
          python main.py \
            timein \
            "${{ secrets.LAT }}" \
            "${{ secrets.LONG }}" \
            "${{ secrets.LOCATION }}" \
            --code "${{ secrets.CODE }}" \
            --user "${{ secrets.USERNAME }}" \
            --passw "${{ secrets.PASSWORD }}"
